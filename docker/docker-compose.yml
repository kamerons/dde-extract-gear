services:
  redis:
    image: redis:7-alpine
    container_name: armor_select_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: armor_select_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DATA_FILE_PATH=data/collected.json
    volumes:
      - ../data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5

  task:
    build:
      context: ..
      dockerfile: docker/Dockerfile.task
    container_name: armor_select_task
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DATA_FILE_PATH=data/collected.json
    volumes:
      - ../data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # GPU for TensorFlow/Keras training and inference (optional; requires nvidia-container-toolkit on host)
    deploy:
      resources:
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        # No memory limit — container can use more when available (helps training)

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: armor_select_frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
