# Development override for docker-compose.yml
# Use with: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up

services:
  api:
    # Override command to enable hot-reload
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    # Mount source code for hot-reload (paths relative to compose file dir = docker/)
    volumes:
      - ../data:/app/data
      - ..:/app
      - ../requirements.txt:/app/requirements.txt
    build:
      context: ..
      dockerfile: docker/Dockerfile.api

  task:
    # Mount source code (worker will need manual restart for changes)
    volumes:
      - ../data:/app/data
      - ..:/app
      - ../requirements.txt:/app/requirements.txt
    # Note: Python workers don't auto-reload, you'll need to restart the container
    # or use a tool like watchdog

  frontend:
    # For frontend, it's better to run `npm run dev` locally
    # This service is disabled in dev mode - use local Vite dev server instead
    profiles:
      - production-only
